name: Benchmark

on:
  push:
    branches:
      - main

jobs:
  stress-benchmarks:
    name: Stress Benchmark Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run stress benchmarks
        id: stress
        uses: ./.github/actions/run-stress-benchmark

      - name: Publish stress benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: go-stress-benchmarks
          tool: "go"
          output-file-path: ${{ steps.stress.outputs.bench_txt }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Upload stress JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: stress-benchmark-json
          path: ${{ steps.stress.outputs.bench_json }}

      - name: Cleanup stress benchmark text log
        if: ${{ always() }}
        run: rm -f "${{ steps.stress.outputs.bench_txt }}"

  correctness-benchmarks:
    name: Correctness Benchmark Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run correctness benchmarks
        id: correctness
        uses: ./.github/actions/run-correctness-benchmark

      - name: Upload correctness JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: correctness-benchmark-json
          path: ${{ steps.correctness.outputs.bench_json }}
