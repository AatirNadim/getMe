name: Build and Push Server Image

on:
  push:
    branches:
      - main
    paths:
      - 'commons/**'
      - 'utils/**'
      - 'server/**'
      - 'ContainerFile.server'
  pull_request:
    branches:
      - main
    paths:
      - 'commons/**'
      - 'utils/**'
      - 'server/**'
      - 'ContainerFile.server'

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"

      - name: Run server tests
        working-directory: ./server/tests
        run: go test -v ./...

  build-and-push:
    name: Build Image
    needs: [test-server]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only login if it's a push event (we don't push on PRs)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and conditionally push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ContainerFile.server
          # true if push to main, false if PR
          push: ${{ github.event_name == 'push' }}
          # Creates tags like: <user>/<image>-server:<sha> and <user>/<image>-server:latest
          tags: ${{ vars.DOCKER_USERNAME }}/${{ vars.SERVER_ONLY_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }},${{ vars.DOCKER_USERNAME }}/${{ vars.SERVER_ONLY_IMAGE_NAME }}:latest
