name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'commons/**'
      - 'utils/**'
      - 'sdks/goSdk/**'
      - 'cli/**'
      - 'http-proxy-go/**'
      - 'server/**'
      - 'ContainerFile'
      - 'docker-entrypoint.sh'

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"

      - name: Run server tests
        working-directory: ./server/tests
        run: go test -v ./...

  test-http-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"

      - name: Run http-proxy-go tests
        working-directory: ./http-proxy-go/tests
        run: go test -v ./...

  build-and-push:
    name: Build and Push Image
    needs: [test-server, test-http-proxy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ContainerFile
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }},${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
