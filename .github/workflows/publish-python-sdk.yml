name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (major, minor, patch)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  check-main-branch:
    uses: ./.github/workflows/reusable-enforce-main-branch.yml

  tag-and-release:
    needs: check-main-branch
    uses: ./.github/workflows/reusable-sdk-release.yml
    with:
      release_type: ${{ github.event.inputs.release_type }}
      sdk_path: "sdks/pythonSdk"

  publish-pypi:
    needs: tag-and-release
    name: Build and Publish Python SDK
    runs-on: ubuntu-latest
    
    # These permissions are REQUIRED for Trusted Publishing (OIDC) to PyPI
    permissions:
      id-token: write 
      contents: read
      
    environment:
      name: pypi
      url: https://pypi.org/p/getme-python-sdk

    defaults:
      run:
        working-directory: ./sdks/pythonSdk

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Check out the exact newly created tag
          ref: ${{ needs.tag-and-release.outputs.new_tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build the SDK
        run: uv build

      - name: Publish to PyPI
        run: uv publish