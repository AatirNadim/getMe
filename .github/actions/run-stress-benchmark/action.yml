name: 'Run stress benchmarks'
description: 'Runs stress benchmarks and exports paths'
outputs:
  bench_txt:
    description: 'Path to benchmark txt output'
    value: ${{ steps.stress.outputs.bench_txt }}
  bench_json:
    description: 'Path to benchmark json output'
    value: ${{ steps.stress.outputs.bench_json }}
runs:
  using: 'composite'
  steps:
    - name: Run stress benchmarks
      id: stress
      shell: bash
      working-directory: server/tests
      run: |
        RESULT_DIR="${GITHUB_WORKSPACE}/server/tests/benchmark-results/stress"
        mkdir -p "$RESULT_DIR"
        TEXT_DIR="$RUNNER_TEMP/getme-bench/stress"
        mkdir -p "$TEXT_DIR"
        TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
        BENCH_BASENAME="stress-${GITHUB_SHA}-${TIMESTAMP}"
        BENCH_TXT="$TEXT_DIR/${BENCH_BASENAME}.txt"
        BENCH_JSON="$RESULT_DIR/${BENCH_BASENAME}.json"
        go test ./stressTest -run=^$ -bench=. -benchmem | tee "$BENCH_TXT"
        go tool test2json -p github.com/AatirNadim/getMe/server/tests/stressTest < "$BENCH_TXT" > "$BENCH_JSON"
        echo "exporting the benchmark results to text format --> to be used by benchmark-action"
        echo "bench_txt=$BENCH_TXT" >> "$GITHUB_OUTPUT"
        echo "exporting the benchmark results to json format"
        echo "bench_json=$BENCH_JSON" >> "$GITHUB_OUTPUT"
