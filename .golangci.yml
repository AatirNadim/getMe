version: "2"

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - gosimple
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow          # Replaces check-shadowing
        - fieldalignment  # Replaces maligned
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
