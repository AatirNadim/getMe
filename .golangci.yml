version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
  disable:
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
        # - fieldalignment
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
